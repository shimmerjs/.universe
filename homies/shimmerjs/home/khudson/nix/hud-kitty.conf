# khudson kitty instance config -- the Edge pane of glass.
# Loaded by `khudson hud-launcher` via kitty --config for the fullscreen HUD
# window; the daily-driver kitty.conf is untouched. Shipped by module.nix as
# ~/.config/khudson/hud-kitty.conf.

# Remote control: socket-only so the bus socket is the only client path; no
# tty-based RC from programs running inside hud windows. listen_on is NOT set
# here: the config form appends -PID to the path, so the launcher passes
# --listen-on on the CLI, which binds the verbatim kitty-panel.sock the bus
# injector dials (fixed path under Application Support, never /tmp -- review
# M10: macOS reaps /private/tmp after ~3 days idle).
allow_remote_control socket-only

# Nix owns updates; a HUD never phones home or beeps.
update_check_interval 0
enable_audio_bell no
confirm_os_window_close 0

# The glass owns every key: no kitty chords can shadow widget input. One quit
# escape hatch for a physically attached keyboard.
clear_all_shortcuts yes
map cmd+q quit

# The glass owns every touch: kitty's default click/selection/link handling
# would race the bus recognizer, so all mouse actions are cleared. Touch
# arrives HID-direct via touchd; physical mice still deliver plain mouse
# reporting to the dock program.
clear_all_mouse_actions yes

# Rendering: match the daily kitty's font family, sized up for the Edge's
# 51cm viewing distance (20 = the live-reviewed size, 196x24 cells on the
# 2560x720 glass); ligatures off to keep glyphs literal; legacy composition
# avoids macOS gamma-thinned strokes on the dark theme.
font_family FiraCode Nerd Font Mono
font_size 20.0
disable_ligatures always
text_composition_strategy legacy

# Fit the 2560x720 glass exactly where the metrics allow (screenshot-measured
# 2026-07-20: natural cells are 13x29 -> 2548x696 grid, 6px side + 12px
# top/bottom gutters kitty pads with the theme background). The px form is
# ADDITIVE (live-verified: "30px" made 59px cells and a 196x12 grid): +1px
# takes the cell to 30 so 24 rows = 720 exactly (both vertical gutters gone,
# the strip band sits flush on the display edge). No cell_width divides 2560
# near 196 columns (2560 = 2^9*5: 13 -> 12px remainder, neighbors 10/16 wreck
# the tuned grid), so top-left placement parks the whole 12px on the right
# edge and the left-edge tabs/home notch touch the bezel.
modify_font cell_height 1px
placement_strategy top-left

# Same theme file the daily kitty includes (themeFile =
# "everforest_dark_soft"), templated in by module.nix from the kitty-themes
# package. The first shipped version hand-inlined the palette and drifted --
# color8 landed near-background and every dock secondary run went invisible
# one include, one source of truth.
include @everforestTheme@
